version: '3'

vars:
  USE_GPU: "--gpus all"

env:
  OLLAMA:
    sh: echo $TRUSTABLE_IMAGES_TRUOLLAMA

tasks:

  prereq:
    silent: true
    cmds:
    - docker -v >/dev/null 2>&1 || die "docker is required."
    - ops util apihost | rg 'http://miniops.me' || die "Nuvolaris miniops required"
    - docker pull "$OLLAMA" || die "cannot pull ollama"

  check-gpu:
    silent: true
    cmds:
    - |
      echo "Checking GPU"
      if docker run  -ti --gpus all --entrypoint=/usr/bin/nvidia-smi  $OLLAMA -L   2>/dev/null | rg ^GPU
      then  echo GPU Found
            echo "--gpus all -e OLLAMA_USE_CUDA=1" >_docker
      else  echo GPU not found
            echo "" >_docker
      fi

  start:
    silent: true
    desc: run ollama container from current config
    cmds:
    - test -e _docker || die "check-gpu required"
    - docker rm -f ollama >/dev/null 2>&1 || true
    - >
      docker run -d
      --name ollama
      --restart unless-stopped
      -p 11434:11434
      -v $HOME/.ollama:/root/.ollama
      -e OLLAMA_KEEP_ALIVE=20m
      $(cat _docker)
      $OLLAMA
    - |
      docker network create nuvolaris-ollama >/dev/null 2>&1 || true
      docker network connect nuvolaris-ollama ollama >/dev/null 2>&1 || true
      docker network connect nuvolaris-ollama nuvolaris-control-plane >/dev/null 2>&1 || true

  preload:
    silent: true
    desc: preload models
    cmds:
    - |
      for i in $(cat ../model.lst)
      do docker exec -ti ollama ollama pull "$i"
      done

  deploy:
    desc: deploy ollama
    silent: true
    cmds:
    - task: prereq
    - task: check-gpu
    - task: start
    - task: preload

  undeploy:
    desc: undeploy ollama
    silent: true
    ignore_errors: true
    cmds:
    - |
      if docker ps -a | rg ollama
      then
          docker network disconnect nuvolaris-ollama ollama >/dev/null 2>&1 || true
          docker rm -f ollama
          docker network disconnect nuvolaris-ollama nuvolaris-control-plane >/dev/null 2>&1 || true
          docker network rm nuvolaris-ollama >/dev/null 2>&1 || true
          echo Ollama stopped
      else
          echo Ollama is not running
      fi

  enter:
    desc: entering ollama
    silent: true
    cmds:
    - docker exec -ti ollama bash

  signed:
    desc: check if could is reachable
    silent: true
    cmds:
    - |
      curl -s http://localhost:11434/api/generate -d '{
      "model": "gpt-oss:20b-cloud",
      "prompt": "hello",
      "stream": false
      }'


  signin:
    desc: signout
    silent: true
    cmds:
    - docker exec -ti ollama ollama signin

  signout:
    desc: signout
    silent: true
    cmds:
    - docker exec -ti ollama ollama signout

  redeploy:
    desc: redeploy ollama
    cmds:
    - task: undeploy
    - task: deploy
