version: "3"

vars:
  EXTRA: ""
  ENTRY: trustable
  SSHLOCAL: .ssh/id_trustable
  UID:
    sh: 'echo {{ if eq OS "windows" }}1000{{ else }}$(id -u){{ end }}'
  GID:
    sh: 'echo {{ if eq OS "windows" }}1000{{ else }}$(id -g){{ end }}'
  SSHDIR:
    sh: echo ~/.ssh | replace -s \\ -r / --stdin
  SSHKEY:
    sh: echo {{.SSHDIR}}/id_trustable
  INGRESS:
    sh: ops util ingress

env:
  KUBECONFIG:
    sh: |-
      if test -e "$OPS_TMP/kubeconfig"
      then echo "$OPS_TMP/kubeconfig"
      else echo ~/.kube/config
      fi

tasks:

  ssh-key:
    silent: true
    desc: generate and deploy an ssh key
    cmds:
    - |
      if ! test -e "{{.SSHKEY}}"
      then mkdir -p "{{.SSHDIR}}"
        echo "Generating key {{.SSHKEY}}"
        ssh-keygen -q -a 100 -t ed25519 -a 100 -N '' -f "{{.SSHKEY}}" -C "{{.ENTRY}} key"
      else
        echo Using {{.SSHKEY}}
      fi
    - |
      touch "{{.SSHDIR}}/config"
      if ! rg "Host {{.ENTRY}}" ~/.ssh/config >/dev/null
      then  echo Adding {{.ENTRY}} entry in ssh config
        echo -e "\nHost {{.ENTRY}}\n  Hostname localhost\n  Port 2222\n  User node\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n  IdentityFile {{.SSHKEY}}\n" >> ~/.ssh/config
      else
        echo Found {{.ENTRY}} entry in ssh config
      fi
    - |
      if rg "{{.ENTRY}} key"  "{{.SSHDIR}}/authorized_keys" 2>/dev/null >/dev/null
      then
        echo Access already added
      else
        cat "{{.SSHKEY}}.pub" >>"{{.SSHDIR}}/authorized_keys"
        echo Added key for external Access
        {{if ne OS "windows"}}
        chmod 0700 "{{.SSHDIR}}"
        chmod 0600 "{{.SSHDIR}}/authorized_keys"
        {{end}}
      fi
    - >
      kubectl -n nuvolaris
      create secret generic ssh-secret
      --from-literal=authorized_keys="$(cat {{.SSHKEY}}.pub)" 2>/dev/null
      || die "ssh-secret already exists"

  kube-config:
    silent: true
    desc: generate the kubeconfig secret to access the cluster internally
    cmds:
    - >
      cat "$KUBECONFIG"
      | replace -s 'server: .*$' --stdin --regex
      -r 'server: https://kubernetes.default.svc.cluster.local'
      >_kubeconfig
    - >
      kubectl -n nuvolaris create secret generic kube-secret
      --from-literal=kubeconfig="$(base64 -e "$(cat _kubeconfig)")"

  ingress:
    silent: true
    desc: deploy the ingress
    env:
      DOMAIN:
        sh: ops util apihost | replace -s 'https?://' -r '' --regex --stdin
    cmds:
      - |
        envsubst -i {{.INGRESS}}.yaml -o _ingress.yaml
        kubectl -n nuvolaris apply -n nuvolaris -f _ingress.yaml

  sts:
    silent: true
    desc: deploy the sts in kubernetes
    cmds:
      - |
        case {{.INGRESS}} in
          traefik) export INGRESS_SVC=traefik.kube-system.svc.cluster.local ;;
          nginx) export INGRESS_SVC=http://ingress-nginx-controller.ingress-nginx.svc.cluster.local ;;
          *) die "unknown service type" ;;
        esac
        envsubst -i nginx.conf -o _nginx.conf
      - kubectl -n nuvolaris create configmap nginx-proxy-config --from-file=nginx.conf=_nginx.conf
      - |
        export IMAGE="{{.TRUSTABLE_IMAGES_TRUSTABLE}}"
        envsubst <sts.yaml >_sts.yaml
        kubectl -n nuvolaris apply -f _sts.yaml

  setup:
    silent: true
    desc: setup trustable
    cmds:
      - ops util apihost | rg miniops.me || die "{{.ENTRY}} requires miniops.me"
      - task: ssh-key
      - task: kube-config
      - task: ingress
      - task: sts
      - >
        kubectl -n nuvolaris wait
        --for=condition=ready pod
        -l app=trustable --timeout=120s
      - >
        retry -t 100 -m 600 ssh {{.ENTRY}} exit 2>&1
        | awk '{s=""; for(i=1;i<=NR;i++) s=s"#"; printf "\rwaiting for ssh: [%s]", s; fflush()}'
      - echo -e "\nyou can now connect to the devcontainer with 'ssh {{.ENTRY}}'"

  uninstall:
    silent: true
    desc: uninstall trustable
    cmds:
      - >
        kubectl -n nuvolaris delete
        sts/trustable svc/trustable-svc cm/nginx-proxy-config
        ing/trustable-ing ing/opencode-ing ing/vite-ing
        secret/ssh-secret secret/kube-secret svc/trustable-ssh
      - echo Please remove the Host {{.ENTRY}} entry from your ~/.ssh/config file if present

  connect:
    silent: true
    desc: specify U=<user> and H=<host> to connect a remote devcontainer
    requires:
      vars: [H,U]
    cmds:
    - echo Connecting to {{.U}}@{{.H}}
    - |
      if ! test -e "{{.SSHKEY}}.pub"
      then scp "{{.U}}@{{.H}}:{{.SSHLOCAL}}" "{{.SSHKEY}}" && ssh-keygen -f "{{.SSHKEY}}" -y >"{{.SSHKEY}}.pub"
      fi
      if test -e "{{.SSHKEY}}.pub"
      then echo Found "{{.SSHKEY}}"
      else echo "Remote user has not a {{.ENTRY}} configured" ; exit 1
      fi
    - |
      if ! rg '^Host {{.ENTRY}}$' "{{.SSHDIR}}/config" >/dev/null
      then cat <<EOF >>"{{.SSHDIR}}/config"

      Host {{.ENTRY}}
        ProxyJump remote-{{.ENTRY}}
        HostName localhost
        Port 2222
        User node
        IdentityFile {{.SSHKEY}}
        StrictHostKeyChecking no
        UserKnownHostsFile /dev/null
      EOF
      else
        echo Found ssh config {{.ENTRY}}
      fi
    - |
      if ! rg '^Host remote-{{.ENTRY}}$' "{{.SSHDIR}}/config" >/dev/null
      then cat <<EOF >>"{{.SSHDIR}}/config"

      Host remote-{{.ENTRY}}
        Hostname {{.H}}
        User {{.U}}
        IdentityFile {{.SSHKEY}}
      EOF
        echo Added ssh config remote-{{.ENTRY}}
      else
        echo Found ssh config remote-{{.ENTRY}}
      fi
    - echo "You can now reach {{.ENTRY}} with ssh {{.ENTRY}}"


