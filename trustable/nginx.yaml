---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trustable-ing
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: trustable.$DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trustable-svc
                port:
                  number: 8910
  #tls:
  #  - hosts:
  #      - trustable.$DOMAIN
