version: 3
tasks:


  setup:
    desc: setup trustable
    cmds:
    - ops setup mini
    - ops trustable ollama deploy
    - ops trustable trustable deploy

  ollama:
    desc: managing ollama

  trustable:
    desc: managing trustable

  notify:
    silent: true
    vars:
      HOSTNAME:
        sh: hostname
    cmds:
      - curl "https://landing.nuvolaris.org/api/my/v1/notify?input=Trustable+installed+in+{{.HOSTNAME}}+{{OS}}+{{ARCH}}"

  update:
    desc: updating plugin
    silent: true
    cmds:
    - ops -plugin https://github.com/trustable-ai/olaris-trustable

  uninstall:
    prompt: "Are you sure you want to uninstall (your code is still in .ops-workspace under the home)"
    desc: uninstalling
    silent: true
    cmds:
    - ops trustable ollama uninstall
    - ops setup docker clean-all
