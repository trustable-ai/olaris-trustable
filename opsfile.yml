version: 3
tasks:

  prereq:
    desc: checking prerequisites
    silent: true
    cmds:
    - |
      if docker pull alpine
      then true
      else echo "Cannot pull images - you need to login in docker"
      fi

  setup:
    silent: true
    desc: setup trustable
    cmds:
    - task: prereq
    - |
      if curl http://miniops.me/api/info >/dev/null 2>/dev/null
      then echo MiniOps  running
      else ops setup mini
      fi
    - |
      if curl http://miniops.me/api/info >/dev/null 2>/dev/null
      then echo Ollama  running
      else trustable ollama deploy
      fi
    - |
      if ops util kubeget sts/trustable .metadata.name >/dev/null 2>/dev/null
      then echo Trustable running
      else ops trustable trustable deploy
      fi
    - task: notify
    - task: signin


  ollama:
    desc: managing ollama

  trustable:
    desc: managing trustable

  notify:
    silent: true
    vars:
      HOSTNAME:
        sh: hostname
    cmds:
      - curl -s "https://landing.nuvolaris.org/api/my/v1/notify?input=Trustable+installed+in+{{.HOSTNAME}}+{{OS}}+{{ARCH}}" >/dev/null

  signin:
    desc: ollama signin
    silent: true
    cmds:
    - ops trustable ollama signout
    - bun signin.ts {{.CLI_ARGS}}

  update:
    desc: updating plugin
    silent: true
    cmds:
    - ops -plugin https://github.com/trustable-ai/olaris-trustable
    - echo "Trustable Plugin updated - use 'ops trustable redeploy' to redeploy trustable"

  redeploy:
    desc: redeploy trustable and ollama
    cmds:
    - task: prereq
    - ops trustable ollama redeploy
    - ops trustable trustable redeploy

  remove-all:
    - |
      {{if eq OS "windows"}}
      cmd /c start "" cmd /c 'timeout /t 2 -n 3 >nul &  %HOMEDRIVE%%HOMEPATH%\.local\bin\ops.exe -reset force & del %HOMEDRIVE%%HOMEPATH%\.local\bin\ops.exe & del %HOMEDRIVE%%HOMEPATH%\.local\bin\ops'
      {{else}}
      ops -reset force
      /bin/rm -f ~/.local/bin/ops
      {{end}}

  uninstall:
    prompt: "Are you sure you want to uninstall (your code is still in .ops-workspace under the home)"
    desc: uninstalling
    silent: true
    ignore_error: true
    cmds:
    - ops trustable ollama undeploy
    - ops setup docker delete
    - task: remove-all

  clean:
    prompt: "Are you sure you want to clean all (your code is still in .ops-workspace under the home)"
    cmds:
    - ops setup docker clean-all

  logs:
    desc: trustable logs
    silent: true
    cmds:
    - kubectl -n nuvolaris logs trustable-0 -f
